<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details — LuceneShop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <header class="bg-indigo-800 text-white shadow-md">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-4">
      <a href="/" class="text-2xl font-black tracking-tight no-underline flex items-center gap-2 text-white">
        <span class="text-indigo-300">🔍</span>
        <span>Lucene<span class="text-indigo-300">Shop</span></span>
      </a>
      <div class="h-6 w-px bg-white/30"></div>
      <a href="/" class="text-sm opacity-80 hover:opacity-100 text-white no-underline">← Back to search</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">
    <div id="loading" class="flex justify-center py-20">
      <svg class="spinner w-10 h-10 text-blue-600" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
      </svg>
    </div>

    <div id="errorBox" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-5 py-4 text-sm"></div>

    <div id="detail" class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="grid grid-cols-1 md:grid-cols-2">
        <!-- Image -->
        <div class="bg-gray-50 flex items-center justify-center p-8 border-b md:border-b-0 md:border-r border-gray-100">
          <img id="pImage" class="max-h-96 max-w-full object-contain rounded-lg" alt="" />
        </div>

        <!-- Info -->
        <div class="p-8 flex flex-col">
          <div id="pCategory" class="text-xs uppercase tracking-wide text-blue-600 font-semibold mb-2"></div>
          <h1 id="pName" class="text-2xl font-bold text-gray-900 leading-snug mb-3"></h1>

          <div class="flex items-center gap-3 mb-4">
            <span id="pRating" class="text-yellow-500 text-lg"></span>
            <span id="pRatingNum" class="text-sm text-gray-400"></span>
          </div>

          <div id="pPrice" class="text-4xl font-black text-gray-900 mb-6"></div>

          <div class="grid grid-cols-2 gap-4 text-sm border-t border-gray-100 pt-5">
            <div>
              <div class="text-gray-400 text-xs uppercase tracking-wide mb-0.5">Brand</div>
              <div id="pBrand" class="font-medium text-gray-800"></div>
            </div>
            <div>
              <div class="text-gray-400 text-xs uppercase tracking-wide mb-0.5">Product ID</div>
              <div id="pId" class="font-mono text-gray-800"></div>
            </div>
          </div>

          <a href="/" class="mt-auto pt-6">
            <span class="inline-block bg-indigo-500 hover:bg-indigo-400 text-white font-bold px-6 py-3 rounded-lg shadow transition">
              ← Continue searching
            </span>
          </a>
        </div>
      </div>

      <!-- Description -->
      <div class="px-8 py-6 border-t border-gray-100">
        <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-2">Description</h2>
        <p id="pDescription" class="text-gray-600 leading-relaxed"></p>
      </div>
    </div>
  </main>

  <script>
    function escHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function decodeEntities(s) {
      const d = document.createElement('div');
      d.innerHTML = String(s ?? '');
      return d.textContent || '';
    }

    async function load() {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) { showError('No product id provided.'); return; }

      try {
        const res = await fetch(`/api/product/${encodeURIComponent(id)}`);
        if (res.status === 404) { showError('Product not found.'); return; }
        if (!res.ok) { showError('Could not load product.'); return; }
        render(await res.json());
      } catch (e) {
        showError('Could not reach the API. Is the server running?');
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    function render(p) {
      const name = decodeEntities(p.name);
      document.title = name + ' — BestBuy Vector Search';
      document.getElementById('pCategory').textContent = p.category || '';
      document.getElementById('pName').textContent = name;

      const rating = Math.min(Number(p.rating) || 0, 5);
      const filled = Math.round(rating);
      document.getElementById('pRating').textContent =
        rating > 0 ? '★'.repeat(filled) + '☆'.repeat(5 - filled) : 'No rating';
      document.getElementById('pRatingNum').textContent = rating > 0 ? `(${rating.toFixed(1)})` : '';

      document.getElementById('pPrice').textContent = '$' + (Number(p.price) || 0).toFixed(2);
      document.getElementById('pBrand').textContent = decodeEntities(p.brand) || 'Unknown';
      document.getElementById('pId').textContent = p.id;
      document.getElementById('pDescription').textContent = decodeEntities(p.description) || 'No description available.';

      const img = document.getElementById('pImage');
      if (p.imageUrl) {
        img.src = p.imageUrl;
        img.alt = name;
        img.onerror = () => { img.replaceWith(Object.assign(document.createElement('div'),
          { className: 'text-7xl text-gray-300', textContent: '📦' })); };
      } else {
        img.replaceWith(Object.assign(document.createElement('div'),
          { className: 'text-7xl text-gray-300', textContent: '📦' }));
      }

      document.getElementById('detail').classList.remove('hidden');
    }

    function showError(msg) {
      const el = document.getElementById('errorBox');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    load();
  </script>
</body>
</html>
