<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BestBuy Vector Search — Powered by Lucene HNSW</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .mode-btn.active { background: #1e3a5f; color: #fff; }
    .product-img { object-fit: contain; background: #f8f8f8; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-[#003087] text-white shadow-md">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-4">
      <div class="text-3xl font-black tracking-tight">
        <span class="text-yellow-400">best</span>buy
      </div>
      <div class="h-6 w-px bg-white/30"></div>
      <div class="text-sm opacity-80">Vector Search — Powered by Lucene HNSW</div>
    </div>
  </header>

  <!-- Search bar -->
  <div class="bg-[#003087] pb-8 pt-4 px-6">
    <div class="max-w-6xl mx-auto">
      <div class="flex gap-2">
        <input id="searchInput" type="text"
          placeholder="Search products... (e.g. noise cancelling headphones, 4K OLED TV)"
          class="flex-1 px-5 py-3 rounded-lg text-gray-900 text-base shadow focus:outline-none focus:ring-2 focus:ring-yellow-400"
          value="wireless noise cancelling headphones" />
        <button onclick="doSearch()"
          class="bg-yellow-400 hover:bg-yellow-300 text-gray-900 font-bold px-6 py-3 rounded-lg shadow transition">
          Search
        </button>
      </div>

      <div class="flex flex-wrap items-center gap-4 mt-4">
        <!-- Category filter (populated from API) -->
        <div class="flex items-center gap-2 text-white text-sm">
          <span class="opacity-70">Category:</span>
          <select id="categoryFilter"
            class="bg-white/10 border border-white/30 text-white rounded-md px-3 py-1.5 text-sm focus:outline-none">
            <option value="">All Categories</option>
          </select>
        </div>

        <!-- Search mode -->
        <div class="flex items-center gap-1 text-sm">
          <span class="text-white/70 mr-1">Mode:</span>
          <button class="mode-btn active px-3 py-1.5 rounded-l-md border border-white/30 text-white text-sm"
            data-mode="hybrid" onclick="setMode(this)">Hybrid</button>
          <button class="mode-btn px-3 py-1.5 border-t border-b border-white/30 text-white/70 text-sm"
            data-mode="vector" onclick="setMode(this)">Vector</button>
          <button class="mode-btn px-3 py-1.5 rounded-r-md border border-white/30 text-white/70 text-sm"
            data-mode="text" onclick="setMode(this)">BM25</button>
        </div>

        <!-- Result count -->
        <div class="flex items-center gap-2 text-white text-sm">
          <span class="opacity-70">Results:</span>
          <select id="limitSelect"
            class="bg-white/10 border border-white/30 text-white rounded-md px-3 py-1.5 text-sm focus:outline-none">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Results -->
  <main class="max-w-6xl mx-auto px-6 py-6">
    <div id="statsBar" class="hidden flex items-center justify-between mb-4 text-sm text-gray-500">
      <span id="statsText"></span>
      <span id="modeTag" class="px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-700"></span>
    </div>

    <div id="loading" class="hidden flex justify-center py-16">
      <svg class="spinner w-10 h-10 text-blue-600" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
      </svg>
    </div>

    <div id="errorBox" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-5 py-4 text-sm mb-4"></div>

    <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>

    <div id="emptyState" class="hidden text-center py-16 text-gray-400">
      <div class="text-5xl mb-3">🔍</div>
      <div class="text-lg font-medium text-gray-500">No results found</div>
      <div class="text-sm mt-1">Try a different query or remove the category filter</div>
    </div>
  </main>

  <script>
    let currentMode = 'hybrid';

    // Load categories from API and populate dropdown
    async function loadCategories() {
      try {
        const cats = await fetch('/api/categories').then(r => r.json());
        const sel = document.getElementById('categoryFilter');
        cats.forEach(cat => {
          const opt = document.createElement('option');
          opt.value = cat;
          opt.textContent = cat;
          sel.appendChild(opt);
        });
      } catch (_) {}
    }

    function setMode(btn) {
      currentMode = btn.dataset.mode;
      document.querySelectorAll('.mode-btn').forEach(b => {
        b.classList.remove('active');
        b.classList.add('text-white/70');
        b.classList.remove('text-white');
      });
      btn.classList.add('active');
      btn.classList.remove('text-white/70');
      btn.classList.add('text-white');
    }

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      const category = document.getElementById('categoryFilter').value;
      const limit = document.getElementById('limitSelect').value;
      const params = new URLSearchParams({ q, mode: currentMode, limit });
      if (category) params.set('category', category);

      setLoading(true);
      document.getElementById('errorBox').classList.add('hidden');

      try {
        const res = await fetch(`/api/search?${params}`);
        if (res.status === 503) {
          showError('⏳ Index is still being built — please wait a few seconds and try again.');
          return;
        }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          showError(err.error || 'Search failed');
          return;
        }
        renderResults(await res.json());
      } catch (e) {
        showError('Could not reach the search API. Is the server running?');
      } finally {
        setLoading(false);
      }
    }

    function renderResults(data) {
      const grid = document.getElementById('resultsGrid');
      const statsBar = document.getElementById('statsBar');
      const emptyState = document.getElementById('emptyState');

      if (!data.results?.length) {
        grid.innerHTML = '';
        emptyState.classList.remove('hidden');
        statsBar.classList.add('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      statsBar.classList.remove('hidden');
      document.getElementById('statsText').textContent =
        `${data.totalHits} result${data.totalHits !== 1 ? 's' : ''} in ${data.durationMs}ms`;
      document.getElementById('modeTag').textContent =
        data.mode === 'hybrid' ? 'BM25 + Vector' : data.mode === 'vector' ? 'Vector (HNSW)' : 'BM25';

      const maxScore = Math.max(...data.results.map(r => r.score));

      grid.innerHTML = data.results.map((r, i) => {
        const p = r.product;
        const pct = maxScore > 0 ? Math.round((r.score / maxScore) * 100) : 0;
        const rating = Number(p.rating) || 0;
        const stars = rating > 0
          ? '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating))
          : '';

        const imgHtml = p.imageUrl
          ? `<div class="h-44 flex items-center justify-center p-3 bg-gray-50 border-b border-gray-100">
               <img src="${p.imageUrl}" alt="${escHtml(p.name)}"
                 class="product-img max-h-40 max-w-full rounded"
                 onerror="this.parentElement.innerHTML='<div class=\\'h-44 flex items-center justify-center text-gray-300 text-4xl\\'>📦</div>'" />
             </div>`
          : `<div class="h-44 flex items-center justify-center bg-gray-50 border-b border-gray-100 text-gray-300 text-5xl">📦</div>`;

        return `
        <div class="card bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
          ${imgHtml}
          <div class="p-4 flex-1 flex flex-col">
            <div class="flex items-start justify-between gap-1 mb-1">
              <span class="text-xs text-gray-400 truncate flex-1">${escHtml(p.category)}</span>
              <span class="text-xs text-gray-300 font-mono">#${i + 1}</span>
            </div>
            <h3 class="font-semibold text-gray-900 text-sm leading-snug mb-1 line-clamp-2">${escHtml(p.name)}</h3>
            ${p.description ? `<p class="text-xs text-gray-500 leading-relaxed line-clamp-2 mb-2">${escHtml(p.description)}</p>` : ''}
            <div class="mt-auto pt-2 border-t border-gray-100 flex items-end justify-between">
              <div>
                <div class="text-base font-bold text-gray-900">$${(Number(p.price) || 0).toFixed(2)}</div>
                <div class="text-xs text-gray-400">${escHtml(p.brand)}${stars ? ' · <span class="text-yellow-500">' + stars + '</span>' : ''}</div>
              </div>
              <div class="text-right">
                <div class="w-16 bg-gray-100 rounded-full h-1 overflow-hidden mb-0.5">
                  <div class="bg-blue-500 h-full rounded-full" style="width:${pct}%"></div>
                </div>
                <div class="text-xs text-gray-400">${r.score.toFixed(3)}</div>
              </div>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function escHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function setLoading(on) {
      document.getElementById('loading').classList.toggle('hidden', !on);
      document.getElementById('resultsGrid').classList.toggle('hidden', on);
      document.getElementById('statsBar').classList.toggle('hidden', on);
    }

    function showError(msg) {
      const el = document.getElementById('errorBox');
      el.textContent = msg;
      el.classList.remove('hidden');
      document.getElementById('resultsGrid').innerHTML = '';
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('statsBar').classList.add('hidden');
    }

    loadCategories().then(() => doSearch());
  </script>
</body>
</html>
